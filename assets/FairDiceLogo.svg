<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Icon Background (Deep Surface Color) -->
  <rect width="1024" height="1024" fill="#1E252B" />

  <!-- The Dice Body (Centered rounded rectangle to prevent OS cropping) -->
  <rect x="140" y="140" width="744" height="744" rx="160" fill="#2C363F" stroke="#344E41" stroke-width="12" />

  <!-- The 6 Pips (High-Luminance Emerald for WCAG compliant contrast) -->
  <!-- Left Column -->
  <circle cx="340" cy="340" r="85" fill="#50C878" />
  <circle cx="340" cy="512" r="85" fill="#50C878" />
  <circle cx="340" cy="684" r="85" fill="#50C878" />

  <!-- Right Column -->
  <circle cx="684" cy="340" r="85" fill="#50C878" />
  <circle cx="684" cy="512" r="85" fill="#50C878" />
  <circle cx="684" cy="684" r="85" fill="#50C878" />
</svg>